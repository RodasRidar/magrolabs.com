<h2 class="text-2xl text-gray-900 mb-6 max-lg:hidden">Pago</h2>
<div class="space-y-4">
    @for (item of list; track $index) {
    <details class="group rounded-lg bg-[#dcdcdc]  [&_summary::-webkit-details-marker]:hidden sm:w-[50vw]">
        <summary class="flex cursor-pointer items-center p-4 justify-between gap-1.5 text-gray-900">
            <h2 class="font-semibold">{{item.title}}</h2>
            <span class="relative size-5 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 size-5 opacity-100 group-open:opacity-0"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>

                <svg xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 size-5 opacity-0 group-open:opacity-100"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </span>
        </summary>

        <p class="leading-relaxed text-gray-700 px-6 pb-6">
            {{item.description}}
        </p>
    </details>
    }
</div>
