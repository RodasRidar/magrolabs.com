<div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <a routerLink="/">
        <img class="mx-auto h-12 w-auto" src="favicon.png" alt="Magrolabs icon">
      </a>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Inicia sesión.</h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        O
        <a routerLink="/registro" class="font-medium text-[#d07d66] hover:text-[#d7816a]">Empieza tu prueba gratuita de {{ENV.diasNormalesDePruebaOperiodoDeReflexion}} días.</a>
      </p>
    </div>
  
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
        <form class="space-y-6" action="#" method="POST">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700"> Correo </label>
            <div class="mt-1">
              <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#d7816a] focus:border-[#d7816a] sm:text-sm">
            </div>
          </div>
  
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700"> Constraseña </label>
            <div class="mt-1">
              <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-[#d7816a] focus:border-[#d7816a] sm:text-sm">
            </div>
          </div>
  
          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-[#d07d66] focus:ring-[#d7816a] border-gray-300 rounded">
              <label for="remember-me" class="ml-2 block text-sm text-gray-900"> Recordarmelo </label>
            </div>
  
            <div class="text-sm">
              <a routerLink="/recuperar-password" class="font-medium text-[#d07d66] hover:text-[#d7816a]"> Olvidaste tu contraseña? </a>
            </div>
          </div>
  
          <div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#d07d66] hover:bg-[#d7816a] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#d7816a]">
                Continuar
            </button>
          </div>
        </form>
  
      </div>
    </div>
  </div>
