<app-navbar [type]="navbarTypeEnum.LANDING" [isCheckout]="false" />
<section class="body-font relative flex flex-col justify-center items-center">
    <div class="sm:px-2 sm:py-4 justify-center self-center flex sm:flex-nowrap flex-wrap">
        <div class=" shadow-xl mx-auto sm:rounded-3xl bg-[#f6f6f6] overflow-hidden flex relative">
            <div class="w-full h-full max-w-7xl">
                <div class="flex flex-col items-start h-fit px-4 sm:px-16  py-8">
                    <h1 class="text-4xl font-bold pb-8 border-b-4 border-[#d7816a] w-full pl-16 -ml-16">Políticas.</h1>
                    <p class="text-lg mt-6">A continuación encontrarás desglosado toda la información sobre nuestas políticas de privacidad, Terminos y Condiciones, Condiciones de uso y Politica de Cookies. </p>
                    <div class="pt-12 md:pt-10">
                        <div class="px-3 md:container">
                            <div class="lg:flex">
                                <div class="items-center lg:hidden">
                                    <select (change)="onSelectOption($event)" [(ngModel)]="selectedOption"
                                        class="mx-2 mb-8 px-4.5 py-2.5 rounded-md border-gray-300 h-full w-[-webkit-fill-available] text-xl focus:ring-2 focus:ring-inset focus:ring-[#d07d66]   block  border-0  text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300  ">
                                        <option class="text-base" value="/politicas/preguntas-frecuentes">
                                            Terminos y Condiciones</option>
                                        <option value="/politicas/condiciones-de-uso">Condiciones de Uso</option>
                                        <option value="/politicas/privacidad">Privacidad</option>
                                        <option value="/politicas/cookies">Cookies</option>
                                    </select>
                                </div>
                                <div class="left-flex hidden lg:block mr-10 mb-10">
                                    <div class="mt-3 px-6"><a routerLink="terminos-y-condiciones"
                                            routerLinkActive="font-bold text-[#d07d66]" aria-current="page"
                                            class="ota-body-light nuxt-link-exact-active nuxt-link-active">
                                            Terminos y Condiciones
                                        </a></div>
                                    <div class="mt-3 px-6"><a routerLink="condiciones-de-uso"
                                            routerLinkActive="font-semibold text-[#d07d66]" class="ota-body-light">
                                            Condiciones de Uso
                                        </a></div>
                                    <div class="mt-3 px-6"><a routerLink="/politicas/privacidad"
                                            routerLinkActive="font-semibold text-[#d07d66]" class="ota-body-light">
                                            Privacidad
                                        </a></div>
                                    <div class="mt-3 px-6"><a routerLink="cookies"
                                            routerLinkActive="font-semibold text-[#d07d66]" class="ota-body-light">
                                            Cookies
                                        </a></div>
                                </div>
                                <div class="flex">
                                    <div class="mx-auto sm:max-w-2xl px-2 lg:px-8">
                                        <router-outlet></router-outlet>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
<app-footer />
