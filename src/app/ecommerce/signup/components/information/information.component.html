<div class="mb-5">
    <dl class="p-4 grid w-full grid-cols-1 gap-x-4 gap-y-4 max-lg:gap-y-2 bg-bg-alt rounded-xl">
        @for (item of information(); track $index) {
        <div class="relative pl-2 text-pretty">
            <dt>
                <ml-icon name="check" class="absolute size-5 text-fg" />
                <p class="ml-6 text-base max-lg:text-xs leading-6 font-medium text-fg-muted">
                    {{item.name}}
                </p>
            </dt>
        </div>
        }
    </dl>
</div>
