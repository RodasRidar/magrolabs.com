<div>
  <label [for]="inputId()" class="block text-sm font-medium leading-6 text-gray-700">
    {{ label() }}@if (required()) { <span class="text-red-500">*</span> }
  </label>
  <div class="mt-1">
    <ng-content />
  </div>
  @if (errors().length > 0) {
    <div class="mt-1 px-1">
      @for (error of errors(); track $index) {
        <p class="text-xs text-red-500">{{ error }}</p>
      }
    </div>
  }
</div>
