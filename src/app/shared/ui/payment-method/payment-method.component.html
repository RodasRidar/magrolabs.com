<div class="max-w-md">
    <ul class="space-y-3 lg:space-y-4">

        <!-- Opción 1: tarjeta enrolada del cliente (si existe) -->
        @if (enrolledCard(); as card) {
            <li>
                <label class="block relative cursor-pointer">
                    <input
                        type="radio"
                        name="payment-selection"
                        class="sr-only"
                        [checked]="currentSelection() === 'CARD_ENROLLED'"
                        (change)="selectOption('CARD_ENROLLED')" />
                    <div
                        class="w-full flex gap-x-3 items-start p-4 rounded-lg border bg-white shadow-sm transition"
                        [class.ring-2]="currentSelection() === 'CARD_ENROLLED'"
                        [class.ring-[#D7816A]]="currentSelection() === 'CARD_ENROLLED'">
                        <div class="flex-none">
                            @if (card.brand.toUpperCase() === 'VISA') {
                                <img src="/logo_visa.png" alt="Visa" class="w-6 h-auto" />
                            } @else if (card.brand.toUpperCase() === 'MASTERCARD') {
                                <img src="/logo_mastercard.svg" alt="Mastercard" class="w-6 h-auto" />
                            } @else if (card.brand.toUpperCase().includes('AME')) {
                                <img src="/logo_amex.svg" alt="Amex" class="w-6 h-auto" />
                            } @else {
                                <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#434343">
                                    <path d="M880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720Zm-720 80h640v-80H160v80Zm0 160v240h640v-240H160Z" />
                                </svg>
                            }
                        </div>
                        <div class="flex-1">
                            <h3 class="leading-none text-gray-800 font-medium">{{ card.brand }} •••• {{ card.last4 }}</h3>
                            <p class="mt-1 text-sm text-gray-600">Paga con tu tarjeta guardada.</p>
                        </div>
                        <div
                            class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                            [class.bg-[#D7816A]]="currentSelection() === 'CARD_ENROLLED'"
                            [class.border-[#D7816A]]="currentSelection() === 'CARD_ENROLLED'">
                            @if (currentSelection() === 'CARD_ENROLLED') {
                                <svg class="w-2.5 h-2.5" viewBox="0 0 12 10">
                                    <polyline fill="none" stroke-width="2px" stroke="currentColor" points="1.5 6 4.5 9 10.5 1" />
                                </svg>
                            }
                        </div>
                    </div>
                </label>
            </li>
        }

        <!-- Opción "tarjeta vía portal Flow" (guest sin flag de registro) -->
        @if (canPayCardViaPortal()) {
            <li>
                <label class="block relative cursor-pointer">
                    <input
                        type="radio"
                        name="payment-selection"
                        class="sr-only"
                        [checked]="currentSelection() === 'CARD_PORTAL'"
                        (change)="selectOption('CARD_PORTAL')" />
                    <div
                        class="w-full flex gap-x-3 items-start p-4 rounded-lg border bg-white shadow-sm transition"
                        [class.ring-2]="currentSelection() === 'CARD_PORTAL'"
                        [class.ring-[#D7816A]]="currentSelection() === 'CARD_PORTAL'">
                        <div class="flex-none">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#434343">
                                <path d="M880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720Zm-720 80h640v-80H160v80Zm0 160v240h640v-240H160Z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="leading-none text-gray-800 font-medium">Paga con tu tarjeta de crédito o débito</h3>
                            <p class="mt-1 text-sm text-gray-600">Te llevamos al portal seguro de Flow para completar tu pago.</p>
                        </div>
                        <div
                            class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                            [class.bg-[#D7816A]]="currentSelection() === 'CARD_PORTAL'"
                            [class.border-[#D7816A]]="currentSelection() === 'CARD_PORTAL'">
                            @if (currentSelection() === 'CARD_PORTAL') {
                                <svg class="w-2.5 h-2.5" viewBox="0 0 12 10">
                                    <polyline fill="none" stroke-width="2px" stroke="currentColor" points="1.5 6 4.5 9 10.5 1" />
                                </svg>
                            }
                        </div>
                    </div>
                </label>
            </li>
        }

        <!-- Opción "Agregar Tarjeta" + acordeón widget pegado abajo (continuación visual) -->
        @if (canEnrollCard()) {
            <li>
                <label class="block relative cursor-pointer">
                    <input
                        type="radio"
                        name="payment-selection"
                        class="sr-only"
                        [checked]="currentSelection() === 'ADD_CARD'"
                        (change)="selectOption('ADD_CARD')" />
                    <div
                        class="w-full flex gap-x-3 items-start p-4 border bg-white shadow-sm transition"
                        [class.rounded-lg]="currentSelection() !== 'ADD_CARD'"
                        [class.rounded-t-lg]="currentSelection() === 'ADD_CARD'"
                        [class.rounded-b-none]="currentSelection() === 'ADD_CARD'"
                        [class.border-b-0]="currentSelection() === 'ADD_CARD'"
                        [class.ring-2]="currentSelection() === 'ADD_CARD'"
                        [class.ring-[#D7816A]]="currentSelection() === 'ADD_CARD'">
                        <div class="flex-none">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#434343">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="leading-none text-gray-800 font-medium">
                                @if (enrolledCard()) {
                                    Agregar otra tarjeta
                                } @else {
                                    Paga con tu tarjeta de débito o crédito
                                }
                            </h3>
                            <p class="mt-1 text-sm text-gray-600">Tu tarjeta queda guardada para tu próxima compra.</p>
                        </div>
                        <div
                            class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                            [class.bg-[#D7816A]]="currentSelection() === 'ADD_CARD'"
                            [class.border-[#D7816A]]="currentSelection() === 'ADD_CARD'">
                            @if (currentSelection() === 'ADD_CARD') {
                                <svg class="w-2.5 h-2.5" viewBox="0 0 12 10">
                                    <polyline fill="none" stroke-width="2px" stroke="currentColor" points="1.5 6 4.5 9 10.5 1" />
                                </svg>
                            }
                        </div>
                    </div>
                </label>

                <!-- Acordeón pegado a la card de arriba (sin mt) — solo visible cuando ADD_CARD está seleccionado -->
                <div
                    class="overflow-hidden border-l border-r border-b border-gray-200 bg-gray-50 transition-all duration-300"
                    [class.max-h-0]="currentSelection() !== 'ADD_CARD'"
                    [class.opacity-0]="currentSelection() !== 'ADD_CARD'"
                    [class.max-h-[500px]]="currentSelection() === 'ADD_CARD'"
                    [class.opacity-100]="currentSelection() === 'ADD_CARD'"
                    [class.rounded-b-lg]="currentSelection() === 'ADD_CARD'"
                    [class.ring-2]="currentSelection() === 'ADD_CARD'"
                    [class.ring-[#D7816A]]="currentSelection() === 'ADD_CARD'">
                    @if (currentSelection() === 'ADD_CARD') {
                        @if (flowToken(); as tk) {
                            <div class="p-3 sm:p-4">
                                <app-flow-widget-add-card
                                    [token]="tk"
                                    (cardAddedSuccessfully)="onCardEnrolled($event)" />
                            </div>
                        } @else {
                            <div class="p-6 flex items-center justify-center text-sm text-gray-500">
                                <svg class="w-4 h-4 mr-2 animate-spin text-[#D7816A]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Preparando el formulario seguro de tarjeta…
                            </div>
                        }
                    }
                </div>
            </li>
        }

        <!-- Opción 3: Yape (siempre visible) -->
        <li>
            <label class="block relative cursor-pointer">
                <input
                    type="radio"
                    name="payment-selection"
                    class="sr-only"
                    [checked]="currentSelection() === 'YAPE'"
                    (change)="selectOption('YAPE')" />
                <div
                    class="w-full flex gap-x-3 items-start p-4 rounded-lg border bg-white shadow-sm transition"
                    [class.ring-2]="currentSelection() === 'YAPE'"
                    [class.ring-[#D7816A]]="currentSelection() === 'YAPE'">
                    <div class="flex-none">
                        <img src="/logo_yape.png" alt="Yape" class="w-6 h-auto" />
                    </div>
                    <div class="flex-1">
                        <h3 class="leading-none text-gray-800 font-medium">Yape</h3>
                        <p class="mt-1 text-sm text-gray-600">Paga con Yape u otras billeteras.</p>
                    </div>
                    <div
                        class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                        [class.bg-[#D7816A]]="currentSelection() === 'YAPE'"
                        [class.border-[#D7816A]]="currentSelection() === 'YAPE'">
                        @if (currentSelection() === 'YAPE') {
                            <svg class="w-2.5 h-2.5" viewBox="0 0 12 10">
                                <polyline fill="none" stroke-width="2px" stroke="currentColor" points="1.5 6 4.5 9 10.5 1" />
                            </svg>
                        }
                    </div>
                </div>
            </label>
        </li>

        <p class="flex justify-start text-sm font-medium text-gray-500 mt-6">
            <svg class="w-5 h-5 text-gray-400 mr-1.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
            Pago seguro con
            <a href="https://flowpagos.com/" class="ml-1 hover:underline text-gray-800" target="_blank">Flow</a>
        </p>
    </ul>
</div>
