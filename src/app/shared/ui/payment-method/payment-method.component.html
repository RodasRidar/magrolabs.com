<div class="max-w-md">
    <ul
        class="space-y-3 lg:space-y-4 transition"
        [class.opacity-60]="disabled()"
        [class.pointer-events-none]="disabled()"
        [attr.aria-disabled]="disabled() ? 'true' : null">

        <!-- Opción 1: tarjeta enrolada del cliente (si existe) -->
        @if (enrolledCard(); as card) {
            <li>
                <label class="block relative" [class.cursor-pointer]="!disabled()" [class.cursor-not-allowed]="disabled()">
                    <input
                        type="radio"
                        name="payment-selection"
                        class="sr-only"
                        [disabled]="disabled()"
                        [checked]="currentSelection() === 'CARD_ENROLLED'"
                        (change)="selectOption('CARD_ENROLLED')" />
                    <div
                        class="w-full flex gap-x-3 items-start p-4 rounded-lg border bg-bg shadow-sm transition"
                        [class.ring-2]="currentSelection() === 'CARD_ENROLLED'"
                        [class.ring-primary-hover]="currentSelection() === 'CARD_ENROLLED'">
                        <div class="flex-none">
                            @if (card.brand.toUpperCase() === 'VISA') {
                                <img src="/logo_visa.png" alt="Visa" class="w-6 h-auto" />
                            } @else if (card.brand.toUpperCase() === 'MASTERCARD') {
                                <img src="/logo_mastercard.svg" alt="Mastercard" class="w-6 h-auto" />
                            } @else if (card.brand.toUpperCase().includes('AME')) {
                                <img src="/logo_amex.svg" alt="Amex" class="w-6 h-auto" />
                            } @else {
                                <ml-icon name="credit-card" class="h-6 w-6 text-fg-subtle" />
                            }
                        </div>
                        <div class="flex-1">
                            <h3 class="leading-none text-fg font-medium">{{ card.brand }} •••• {{ card.last4 }}</h3>
                            <p class="mt-1 text-sm text-fg-muted">Paga con tu tarjeta guardada.</p>
                        </div>
                        <div
                            class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                            [class.bg-primary-hover]="currentSelection() === 'CARD_ENROLLED'"
                            [class.border-primary-hover]="currentSelection() === 'CARD_ENROLLED'">
                            @if (currentSelection() === 'CARD_ENROLLED') {
                                <ml-icon name="check" class="w-2.5 h-2.5" />
                            }
                        </div>
                    </div>
                </label>
            </li>
        }

        <!-- Opción "tarjeta vía portal Flow" (guest sin flag de registro) -->
        @if (canPayCardViaPortal()) {
            <li>
                <label class="block relative" [class.cursor-pointer]="!disabled()" [class.cursor-not-allowed]="disabled()">
                    <input
                        type="radio"
                        name="payment-selection"
                        class="sr-only"
                        [disabled]="disabled()"
                        [checked]="currentSelection() === 'CARD_PORTAL'"
                        (change)="selectOption('CARD_PORTAL')" />
                    <div
                        class="w-full flex gap-x-3 items-start p-4 rounded-lg border bg-bg shadow-sm transition"
                        [class.ring-2]="currentSelection() === 'CARD_PORTAL'"
                        [class.ring-primary-hover]="currentSelection() === 'CARD_PORTAL'">
                        <div class="flex-none">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="#434343">
                                <path d="M880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720Zm-720 80h640v-80H160v80Zm0 160v240h640v-240H160Z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="leading-none text-fg font-medium">Paga con tu tarjeta de crédito o débito</h3>
                            <p class="mt-1 text-sm text-fg-muted">Te llevamos al portal seguro de Flow para completar tu pago.</p>
                        </div>
                        <div
                            class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                            [class.bg-primary-hover]="currentSelection() === 'CARD_PORTAL'"
                            [class.border-primary-hover]="currentSelection() === 'CARD_PORTAL'">
                            @if (currentSelection() === 'CARD_PORTAL') {
                                <ml-icon name="check" class="w-2.5 h-2.5" />
                            }
                        </div>
                    </div>
                </label>
            </li>
        }

        <!-- Opción "Agregar Tarjeta" + acordeón widget pegado abajo (continuación visual) -->
        @if (canEnrollCard()) {
            <li>
                <label class="block relative" [class.cursor-pointer]="!disabled()" [class.cursor-not-allowed]="disabled()">
                    <input
                        type="radio"
                        name="payment-selection"
                        class="sr-only"
                        [disabled]="disabled()"
                        [checked]="currentSelection() === 'ADD_CARD'"
                        (change)="selectOption('ADD_CARD')" />
                    <div
                        class="w-full flex gap-x-3 items-start p-4 border bg-bg shadow-sm transition"
                        [class.rounded-lg]="currentSelection() !== 'ADD_CARD'"
                        [class.rounded-t-lg]="currentSelection() === 'ADD_CARD'"
                        [class.rounded-b-none]="currentSelection() === 'ADD_CARD'"
                        [class.border-b-0]="currentSelection() === 'ADD_CARD'"
                        [class.ring-2]="currentSelection() === 'ADD_CARD'"
                        [class.ring-primary-hover]="currentSelection() === 'ADD_CARD'">
                        <div class="flex-none">
<ml-icon name="card-add" class="h-5 w-5 text-fg-subtle" />
                        </div>
                        <div class="flex-1">
                            <h3 class="leading-none text-fg font-medium">
                                @if (enrolledCard()) {
                                    Agregar otra tarjeta
                                } @else {
                                    Tarjeta
                                }
                            </h3>
                            <p class="mt-1 text-sm text-fg-muted">Guardaremos esta tarjeta para tu próxima compra.</p>
                        </div>
                        <div
                            class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                            [class.bg-primary-hover]="currentSelection() === 'ADD_CARD'"
                            [class.border-primary-hover]="currentSelection() === 'ADD_CARD'">
                            @if (currentSelection() === 'ADD_CARD') {
                                <ml-icon name="check" class="w-2.5 h-2.5" />
                            }
                        </div>
                    </div>
                </label>

                <!-- Acordeón pegado a la card de arriba (sin mt) — solo visible cuando ADD_CARD está seleccionado -->
                <div
                    class="overflow-hidden border-l border-r border-b border-border bg-bg-alt transition-all duration-300"
                    [class.max-h-0]="currentSelection() !== 'ADD_CARD'"
                    [class.opacity-0]="currentSelection() !== 'ADD_CARD'"
                    [class.max-h-[500px]]="currentSelection() === 'ADD_CARD'"
                    [class.opacity-100]="currentSelection() === 'ADD_CARD'"
                    [class.rounded-b-lg]="currentSelection() === 'ADD_CARD'"
                    [class.ring-2]="currentSelection() === 'ADD_CARD'"
                    [class.ring-primary-hover]="currentSelection() === 'ADD_CARD'">
                    @if (currentSelection() === 'ADD_CARD') {
                        @if (flowToken(); as tk) {
                            <div class="p-3 sm:p-4">
                                <app-flow-widget-add-card
                                    [token]="tk"
                                    (cardAddedSuccessfully)="onCardEnrolled($event)" />
                            </div>
                        } @else {
                            <div class="p-6 flex items-center justify-center text-sm text-fg-subtle">
                                <svg class="w-4 h-4 mr-2 animate-spin text-primary-hover" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Preparando el formulario seguro de tarjeta…
                            </div>
                        }
                    }
                </div>
            </li>
        }

        <!-- Opción 3: Yape (siempre visible) -->
        <li>
            <label class="block relative" [class.cursor-pointer]="!disabled()" [class.cursor-not-allowed]="disabled()">
                <input
                    type="radio"
                    name="payment-selection"
                    class="sr-only"
                    [disabled]="disabled()"
                    [checked]="currentSelection() === 'YAPE'"
                    (change)="selectOption('YAPE')" />
                <div
                    class="w-full flex gap-x-3 items-start p-4 rounded-lg border bg-bg shadow-sm transition"
                    [class.ring-2]="currentSelection() === 'YAPE'"
                    [class.ring-primary-hover]="currentSelection() === 'YAPE'">
                    <div class="flex-none">
                        <img src="/logo_yape.png" alt="Yape" class="w-6 h-auto" />
                    </div>
                    <div class="flex-1">
                        <h3 class="leading-none text-fg font-medium">Yape</h3>
                        <p class="mt-1 text-sm text-fg-muted">Paga con Yape u otras billeteras.</p>
                    </div>
                    <div
                        class="flex-none flex items-center justify-center w-4 h-4 rounded-full border text-white transition"
                        [class.bg-primary-hover]="currentSelection() === 'YAPE'"
                        [class.border-primary-hover]="currentSelection() === 'YAPE'">
                        @if (currentSelection() === 'YAPE') {
                            <svg class="w-2.5 h-2.5" viewBox="0 0 12 10">
                                <polyline fill="none" stroke-width="2px" stroke="currentColor" points="1.5 6 4.5 9 10.5 1" />
                            </svg>
                        }
                    </div>
                </div>
            </label>
        </li>

        <p class="flex justify-start text-sm font-medium text-fg-subtle mt-6">
            <ml-icon name="lock" class="w-5 h-5 text-fg-subtle mr-1.5" />
            Pago seguro con
            <a href="https://flowpagos.com/" class="ml-1 hover:underline text-fg" target="_blank">Flow</a>
        </p>
    </ul>
</div>
