<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Magrolabs - Creatina Premium con Primera Creatina Especial</title>
  <base href="/">
  <meta name="description" content="Suplementos deportivos de alta calidad en Perú. Oferta especial en tu primera creatina. Suscripción mensual con envío sin costo. Prueba 7 días sin compromiso.">
  <meta name="keywords" content="creatina">
  <meta name="author" content="Magrolabs">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Magrolabs" />
  <meta name="apple-mobile-web-app-title" content="Magrolabs" />
  <meta name="author" content="Magrolabs" />
  <meta name="next-head-count" content="29" />
  <meta name="twitter:site" content="@magrolabs" />
  <meta name="twitter:creator" content="@magrolabs" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://www.pacdora.com">
 
  <!-- Preload JSON de animación del loader con prioridad absoluta -->
  <link rel="preload" href="/assets/lottie/loader.json" as="fetch" type="application/json" crossorigin>
  
  <!-- Preload lottie-web para carga inmediata -->
  <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/lottie-web@5/build/player/lottie.min.js">
  
  <style>
    /* Loader inicial - visible inmediatamente */
    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    #initial-loader.hide {
      opacity: 0;
      pointer-events: none;
    }
    
    #lottie-container {
      width: 256px;
      height: 256px;
    }
    
    @media (min-width: 768px) {
      #lottie-container {
        width: 320px;
        height: 320px;
      }
    }
  </style>
   
</head>

<body>
  <!-- Loader inicial que se muestra inmediatamente -->
  <div id="initial-loader">
    <div id="lottie-container"></div>
  </div>
  
  <app-root></app-root>
  
  <!-- Cargar Lottie desde CDN (standalone) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  
  <script>
    // Inicializar animación Lottie
    (function() {
      const container = document.getElementById('lottie-container');
      
      if (typeof lottie !== 'undefined' && container) {
        // Cargar animación
        lottie.loadAnimation({
          container: container,
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: '/assets/lottie/loader.json' // Ruta al JSON
        });
      } else {
        // Fallback: spinner simple
        if (container) {
          container.innerHTML = `
            <div style="width: 64px; height: 64px; border: 4px solid rgba(255,255,255); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <style>
              @keyframes spin { to { transform: rotate(360deg); } }
            </style>
          `;
        }
      }
    })();
  </script>
</body>

</html>
